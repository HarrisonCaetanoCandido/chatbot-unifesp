services:

  ollama:
    image: ollama/ollama
    container_name: botifesp_ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama
    container_name: botifesp_ollama_setup
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        echo 'Aguardando Ollama iniciar...';
        until ollama list > /dev/null 2>&1; do
          echo 'Ollama ainda não está pronto, tentando novamente...';
          sleep 2;
        done;
        sleep 3;
        echo 'Ollama pronto. Baixando modelos...';
        ollama pull llama3.2;
        ollama pull nomic-embed-text;
        echo 'Modelos baixados com sucesso.';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434

  qdrant:
    image: qdrant/qdrant
    container_name: botifesp_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: botifesp_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data: